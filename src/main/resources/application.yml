anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
  max-tokens: ${ANTHROPIC_MAX_TOKENS:1000}

agent:
  context:
    recent-messages-count: ${AGENT_RECENT_MESSAGES_COUNT:5}

spring:
  datasource:
    url: jdbc:h2:file:./data/bookai
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
